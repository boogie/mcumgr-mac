name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  BIN: mcumgr-mac

# Code signing + notarization are enabled automatically when these repository
# secrets are present (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64   base64 of your "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD     password for that .p12
#   MACOS_SIGN_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_API_KEY_ID        App Store Connect API key id
#   APPLE_API_ISSUER_ID     App Store Connect API issuer id
#   APPLE_API_KEY_BASE64    base64 of the App Store Connect API .p8 key
# Without them, the workflow still publishes an unsigned universal binary.

jobs:
  release:
    name: Build, sign & notarize macOS binary
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build (Intel + Apple Silicon)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create -output "dist/${BIN}" \
            "target/x86_64-apple-darwin/release/${BIN}" \
            "target/aarch64-apple-darwin/release/${BIN}"
          chmod +x "dist/${BIN}"

      - name: Detect signing secrets
        id: signing
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          if [ -n "$SIGN_IDENTITY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing secrets not set — publishing an unsigned binary."
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: List signing identities
        if: steps.signing.outputs.enabled == 'true'
        run: security find-identity -v -p codesigning

      - name: Sign (hardened runtime)
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_IDENTITY" "dist/${BIN}"
          codesign --verify --strict --verbose=2 "dist/${BIN}"

      - name: Notarize
        if: steps.signing.outputs.enabled == 'true'
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo "$API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          # Notarization is keyed to the binary's code signature, so the same
          # signed binary inside the tarball is recognized by Gatekeeper.
          ditto -c -k --keepParent "dist/${BIN}" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER" \
            --wait

      - name: Package & checksum
        run: |
          tar -C dist -czf "${BIN}-macos-universal.tar.gz" "${BIN}"
          shasum -a 256 "${BIN}-macos-universal.tar.gz" | tee "${BIN}-macos-universal.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN }}-macos-universal
          path: |
            ${{ env.BIN }}-macos-universal.tar.gz
            ${{ env.BIN }}-macos-universal.tar.gz.sha256

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BIN }}-macos-universal.tar.gz
            ${{ env.BIN }}-macos-universal.tar.gz.sha256
          generate_release_notes: true

      # Update the Homebrew formula to point at this release. Enabled only when
      # a HOMEBREW_TAP_TOKEN secret (a token with push access to the tap repo)
      # is present; otherwise it skips and the formula can be bumped by hand.
      - name: Bump Homebrew tap formula
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping Homebrew formula bump."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(awk '{print $1}' "${BIN}-macos-universal.tar.gz.sha256")"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${BIN}-macos-universal.tar.gz"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/boogie/homebrew-tap.git" tap
          cd tap
          sed -i.bak -E \
            -e "s|^  version \".*\"|  version \"${VERSION}\"|" \
            -e "s|^  url \".*\"|  url \"${URL}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" \
            "Formula/${BIN}.rb"
          rm "Formula/${BIN}.rb.bak"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
          else
            git commit -am "${BIN} ${VERSION}"
            git push
          fi
